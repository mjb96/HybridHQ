name: Build APK

on:
  push:
    branches: [main, claude/android-health-connect-4pd8bt]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
          cache-read-only: false

      - name: Install Android SDK platform 36
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" --sdk_root=$ANDROID_HOME

      # Bundle the PWA files into Android assets so the app loads locally
      - name: Copy PWA into Android assets
        run: |
          mkdir -p android/app/src/main/assets/www
          rsync -av \
            --exclude='.git' \
            --exclude='android' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='scripts' \
            --exclude='.github' \
            --exclude='package*.json' \
            . android/app/src/main/assets/www/

      - name: Build debug APK
        working-directory: android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
